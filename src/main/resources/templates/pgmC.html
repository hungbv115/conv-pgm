<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${programName}">PROGRAM C</title>
    <link rel="stylesheet" th:href="@{/css/terminal.css}">
</head>
<body>

<div class="terminal-screen">
    <div class="terminal-header">
        <div class="terminal-header__block">
            <span th:text="${programName}">PROGRAM C</span>
        </div>
        <div class="terminal-header__block">
            <span>Function: ORDER + CUSTOMER (CALL PGM B)</span>
        </div>
    </div>

    <div class="terminal-log" role="log" aria-live="polite">
        <pre th:each="line : ${programLines}"
             class="terminal-log-line"
             th:text="${line}">Sample program line</pre>
    </div>

    <form id="pgmCForm"
          class="terminal-command"
          th:action="@{/pgmC}"
          method="post"
          style="margin-top: 4px; flex-direction: column; align-items: flex-start; gap: 4px;">
        <div>
            ORDER ID . . . . . . . : 
            <input type="text"
                   name="orderId"
                   th:value="${orderId}"
                   class="terminal-command__input"
                   style="max-width: 200px;">
        </div>
        <div>
            CUST ID . . . . . . . . : 
            <input type="text"
                   name="customerId"
                   th:value="${customerId}"
                   class="terminal-command__input"
                   style="max-width: 200px;">
        </div>
        <div>
            CUST NAME . . . . . . . : 
            <input type="text"
                   name="customerName"
                   th:value="${customerName}"
                   class="terminal-command__input"
                   style="max-width: 260px;">
        </div>
        <div>
            NOTE . . . . . . . . . : 
            <input type="text"
                   name="note"
                   th:value="${note}"
                   class="terminal-command__input"
                   style="max-width: 320px;">
        </div>
        <div style="margin-top: 4px;">
            F9=Process   F3=Exit
        </div>
        <div style="display: flex; gap: 8px; margin-top: 2px;">
            <button type="submit" class="terminal-command__button">F9 Process</button>
        </div>
    </form>

    <form id="pgmCExitForm"
          class="terminal-command"
          th:action="@{/pgmC/exit}"
          method="post"
          style="margin-top: 4px;">
        <span class="terminal-command__prompt">F3==&gt;</span>
        <button type="submit" class="terminal-command__button">Exit to CMD</button>
    </form>
</div>

<script th:src="@{/js/pgmC.js}"></script>

</body>
</html>
